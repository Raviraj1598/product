name: Production (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apps:
    name: Build storefront and admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Vite production env
        run: |
          cp apps/storefront/.env.production.example apps/storefront/.env.production
          cp apps/admin/.env.production.example apps/admin/.env.production

      - name: Build
        run: npm run build:prod

      - name: Upload storefront artifact
        uses: actions/upload-artifact@v4
        with:
          name: storefront-dist
          path: apps/storefront/dist/
          retention-days: 30

      - name: Upload admin artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist/
          retention-days: 30

  verify-api:
    name: Verify API health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Boot API and health check
        env:
          ADMIN_EMAIL: ci@example.com
          ADMIN_PASSWORD: ci-password-12
          CORS_ORIGINS: http://127.0.0.1:5173
        run: |
          cp .env.example .env
          npm run start:server &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/api/health; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to respond"
          exit 1
